    const formatTanggalIndo = (dateStr) => {
        if (!dateStr) return '-';
        const months = ['Januari', 'Februari', 'Maret', 'April', 'Mei', 'Juni', 'Juli', 'Agustus', 'September', 'Oktober', 'November', 'Desember'];
        const parts = dateStr.split('-');
        if (parts.length === 3) {
            const yr = parts[0];
            const mo = parseInt(parts[1], 10) - 1;
            const dy = parseInt(parts[2], 10);
            if (mo >= 0 && mo < 12) {

            }

    // Fungsi Suara (Text-to-Speech) Bahasa Indonesia Premium Berkarakter Perempuan
    const speakVoice = (text) => {
        if ('speechSynthesis' in window) {
            // Hentikan suara yang sedang berjalan agar tidak tumpang tindih
            window.speechSynthesis.cancel();
            
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'id-ID'; // Set bahasa Indonesia
            
            // Ambil seluruh daftar suara dari sistem operasi browser
            const voices = window.speechSynthesis.getVoices();
            
            // Prioritaskan suara perempuan bahasa Indonesia (misalnya: Microsoft Gadis, Google Bahasa Indonesia, srikandi, dsb)
            let femaleVoice = voices.find(v => 
                (v.lang.startsWith('id') || v.lang.includes('ID')) && 
                (v.name.toLowerCase().includes('gadis') || 
                 v.name.toLowerCase().includes('female') || 
                 v.name.toLowerCase().includes('google') ||
                 v.name.toLowerCase().includes('srikandi') ||
                 v.name.toLowerCase().includes('yating') ||
                 v.name.toLowerCase().includes('kanya'))
            );
            
            // Jika tidak ditemukan suara perempuan spesifik, gunakan suara bahasa Indonesia pertama yang tersedia
            if (!femaleVoice) {
                femaleVoice = voices.find(v => v.lang.startsWith('id') || v.name.toLowerCase().includes('indonesia'));
            }
            
            if (femaleVoice) {
                utterance.voice = femaleVoice;
            }
            
            utterance.pitch = 1.15; // Atur pitch ke 1.15 agar karakter suaranya terdengar lebih feminin, cerah, dan ramah
            utterance.rate = 1.0;   // Atur kecepatan pelafalan yang natural dan nyaman didengar

    // Fungsi Bunyi "Bell" Singkat untuk Notifikasi Scan Presensi Berhasil
    // Disintesis langsung via Web Audio API (tanpa file eksternal) agar ringan & tetap bekerja offline
    let bellAudioCtx = null;
    const playBellSound = () => {
        try {
            // Gunakan satu AudioContext yang di-reuse agar lebih responsif saat scan berulang kali
            if (!bellAudioCtx || bellAudioCtx.state === 'closed') {
                bellAudioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (bellAudioCtx.state === 'suspended') bellAudioCtx.resume();

            const ctx = bellAudioCtx;
            const now = ctx.currentTime;
            const master = ctx.createGain();
            master.gain.value = 0.5;
            master.connect(ctx.destination);

            // Kombinasi nada dasar + harmonik agar bunyi menyerupai lonceng/bell yang cerah dan singkat
            const nadaLonceng = [
                { freq: 1567.98, vol: 0.55, delay: 0 },     // G6 - nada utama, dominan
                { freq: 2349.32, vol: 0.22, delay: 0 },     // D7 - harmonik atas
                { freq: 3135.96, vol: 0.12, delay: 0.02 }   // G7 - kilau lonceng
            ];

            nadaLonceng.forEach(n => {
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.type = 'sine';
                osc.frequency.value = n.freq;
                const start = now + n.delay;
                gain.gain.setValueAtTime(n.vol, start);
                gain.gain.exponentialRampToValueAtTime(0.001, start + 0.55);
                osc.connect(gain);
                gain.connect(master);
                osc.start(start);
                osc.stop(start + 0.6);
            });
        } catch (e) {
            console.warn("Tidak dapat memutar suara bell:", e);
        }
    };

        async delete(colName, id) {
            if(IS_PREVIEW) { mockDB[colName] = mockDB[colName].filter(x => x.id !== id); return; }
            await deleteDoc(doc(db, colName, id));
        },
        async getUserPresensi(idAnggota) {
            if(IS_PREVIEW) return mockDB.presensi.filter(x => x.idAnggota === idAnggota);
            const q = query(collection(db, "presensi"), where("idAnggota", "==", idAnggota));
            const snap = await getDocs(q);
            return snap.docs.map(d => ({id: d.id, ...d.data()}));
        },
        async getPresensiJadwal(idJadwal) {
            if(IS_PREVIEW) return mockDB.presensi.filter(x => x.idJadwal === idJadwal);
            const q = query(collection(db, "presensi"), where("idJadwal", "==", idJadwal));
            const snap = await getDocs(q);
            return snap.docs.map(d => ({id: d.id, ...d.data()}));
        }
    };

    async function loadSettings() {
        try {
            const config = await DB.get('pengaturan');
            const globalConf = config.find(x => x.id === 'global');
            if (globalConf) {
                appSettings.appName = globalConf.appName || appSettings.appName;
                appSettings.appIcon = globalConf.appIcon || appSettings.appIcon;
                appSettings.cardTitle = globalConf.cardTitle || appSettings.cardTitle;
                appSettings.bandName = globalConf.bandName || appSettings.bandName;
                appSettings.namaPelatih = globalConf.namaPelatih || appSettings.namaPelatih;
            }
        } catch(e) {
            console.error("Gagal load setting:", e);
        }
    }

    function sendEmailJS(toEmail, nama, statusWaktu, jam) {
        if(IS_PREVIEW) { console.log(`[EMAIL PREVIEW] To: ${toEmail} | ${nama} - ${statusWaktu} jam ${jam}`); return; }
        if(!toEmail || !toEmail.includes('@')) return;
        emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_ID, {
            to_email: toEmail, nama_anggota: nama, status_presensi: statusWaktu, waktu: jam
        }).then(() => console.log('Notif Email Terkirim')).catch(e => console.error('Gagal Email:', e));

    // -- Fungsi Pendeteksi Update / Notifikasi Global --
    async function generateDashboardNotifications(isAdminMode, currentUserId = null) {
        const anggota = await DB.get('anggota');
        const jadwal = await DB.get('jadwal');
        const materi = await DB.get('materi');

        const hariIni = new Date();
        const ddHariIni = String(hariIni.getDate()).padStart(2, '0');
        const mmHariIni = String(hariIni.getMonth() + 1).padStart(2, '0');

        let notificationsHTML = '';

        // 1. NOTIFIKASI ULANG TAHUN ANGGOTA HARI INI
        const listUltah = anggota.filter(a => {
            if (!a.tanggalLahir) return false;
            const parts = a.tanggalLahir.split('-'); // YYYY-MM-DD
            if (parts.length === 3) {
                return parts[1] === mmHariIni && parts[2] === ddHariIni;
            }
            return false;
        });

        if (listUltah.length > 0) {
            listUltah.forEach(a => {
                const isSaya = !isAdminMode && a.id === currentUserId;
                const pesanUltah = isSaya 
                    ? `Selamat Ulang Tahun yang luar biasa untuk kamu! 🥳 Tiup lilin dan teruslah berkarya bersama ${appSettings.bandName}!` 
                    : `Hari ini <strong>${a.namaLengkap}</strong> (${a.seksi}) sedang berulang tahun! Mari berikan ucapan terbaik kita! 🎉`;

                notificationsHTML += `
                    <div class="glass p-4 rounded-2xl border-l-4 border-pink-500 flex items-start gap-3 shadow-sm fade-in mb-4">
                        <div class="w-10 h-10 rounded-full bg-pink-100 flex items-center justify-center text-pink-600 shrink-0">
                            <i class="fas fa-birthday-cake text-lg"></i>
                        </div>
                        <div class="flex-1">
                            <h4 class="font-bold text-gray-800 text-sm">Ada yang Berulang Tahun! 🎂</h4>
                            <p class="text-xs text-gray-600 mt-1">${pesanUltah}</p>
                        </div>
                    </div>
                `;
            });
        }

        // 2. NOTIFIKASI UPDATE JADWAL TERDEKAT (Dalam 3 Hari Ke Depan)
        const jadwalTerdekat = jadwal.filter(j => {
            if (!j.tanggal) return false;
            const tglJadwal = new Date(j.tanggal);
            const selisihWaktu = tglJadwal.getTime() - hariIni.getTime();
            const selisihHari = Math.ceil(selisihWaktu / (1000 * 3600 * 24));
            return selisihHari >= 0 && selisihHari <= 3;
        });

        if (jadwalTerdekat.length > 0) {
            jadwalTerdekat.forEach(j => {
                notificationsHTML += `
                    <div class="glass p-4 rounded-2xl border-l-4 border-amber-500 flex items-start gap-3 shadow-sm fade-in mb-4">
                        <div class="w-10 h-10 rounded-full bg-amber-100 flex items-center justify-center text-amber-600 shrink-0">
                            <i class="fas fa-exclamation-triangle text-lg"></i>
                        </div>
                        <div class="flex-1">
                            <h4 class="font-bold text-gray-800 text-sm">Latihan Penting Mendatang! 📅</h4>
                            <p class="text-xs text-gray-600 mt-1">Agenda <strong>"${j.agenda}"</strong> dijadwalkan pada <strong>${formatTanggalIndo(j.tanggal)}</strong> pukul ${j.waktu} WIB di ${j.lokasi}. Siapkan fisik dan instrumen kalian!</p>
                        </div>
                    </div>
                `;
            });
        }

        // 3. NOTIFIKASI UPDATE MATERI TERBARU (Terbaca jika materi baru ditambahkan/belum selesai dilatih)
        const materiTerbaru = materi.filter(m => m.status === 'Sedang Dilatih');
        if (materiTerbaru.length > 0) {
            materiTerbaru.slice(-2).forEach(m => {
                notificationsHTML += `
                    <div class="glass p-4 rounded-2xl border-l-4 border-pink-500 flex items-start gap-3 shadow-sm fade-in mb-4">
                        <div class="w-10 h-10 rounded-full bg-pink-100 flex items-center justify-center text-pink-600 shrink-0">
                            <i class="fas fa-music text-lg"></i>
                        </div>
                        <div class="flex-1">
                            <h4 class="font-bold text-gray-800 text-sm">Materi Latihan Sedang Berjalan! 🎵</h4>
                            <p class="text-xs text-gray-600 mt-1">Repertoar <strong>"${m.judul}"</strong> untuk target seksi <strong>${m.targetSeksi}</strong> sedang aktif dilatih. ${m.fileUrl ? 'Segera unduh partiturnya!' : 'Silakan hubungi seksi masing-masing.'}</p>
                        </div>
                    </div>
                `;
            });
        }

        return notificationsHTML || `
            <div class="p-4 text-center text-gray-400 italic text-xs">
                <i class="fas fa-bell-slash mb-1 block text-lg"></i> Tidak ada pemberitahuan atau pembaruan hari ini.
            </div>
        `;
    }

        document.getElementById('modal-anggota-form').classList.add('hidden');

    window.cariAnggota = () => {
        const query = document.getElementById('searchAnggota').value.toLowerCase();
        const cards = document.querySelectorAll('.anggota-card');
        cards.forEach(card => {
            const nama = card.getAttribute('data-nama').toLowerCase();
            const seksi = card.getAttribute('data-seksi').toLowerCase();
            if (nama.includes(query) || seksi.includes(query)) {
                card.classList.remove('hidden');
            } else {
                card.classList.add('hidden');
            }
        });
    };

        const anggota = (await DB.get('anggota')).find(a => a.id === id);
        if(!anggota) return;
        
        state.editingAnggotaId = id;
        
        // Tampilkan modal pop-up formulir terlebih dahulu
        document.getElementById('modal-anggota-form').classList.remove('hidden');
        
        // Isi form dengan data yang sudah ada
        document.querySelector('input[name="nama"]').value = anggota.namaLengkap;
        document.querySelector('input[name="tempatLahir"]').value = anggota.tempatLahir || '';
        document.querySelector('input[name="tanggalLahir"]').value = anggota.tanggalLahir || '';
        document.querySelector('input[name="kelas"]').value = anggota.kelas || '';
        document.querySelector('input[name="alamat"]').value = anggota.alamat || '';
        document.querySelector('input[name="noWa"]').value = anggota.noWa || '';
        document.querySelector('input[name="namaOrangTua"]').value = anggota.namaOrangTua || '';
        document.querySelector('input[name="pekerjaan"]').value = anggota.pekerjaan || '';
        document.querySelector('input[name="email"]').value = anggota.emailOrangTua || '';
        document.querySelector('select[name="seksi"]').value = anggota.seksi;
        document.querySelector('input[name="fotoUrl"]').value = anggota.fotoUrl || '';
        document.querySelector('input[name="username"]').value = anggota.username;

        e.preventDefault();
        const data = {
            namaLengkap: e.target.nama.value,
            tempatLahir: e.target.tempatLahir.value,
            tanggalLahir: e.target.tanggalLahir.value,
            kelas: e.target.kelas.value,
            alamat: e.target.alamat.value,
            noWa: e.target.noWa.value,
            namaOrangTua: e.target.namaOrangTua.value,
            pekerjaan: e.target.pekerjaan.value,
            emailOrangTua: e.target.email.value,
            seksi: e.target.seksi.value,
            fotoUrl: e.target.fotoUrl.value,
            username: e.target.username.value,
            password: e.target.password.value
        };
        
        if (state.editingAnggotaId) {
            await DB.update('anggota', state.editingAnggotaId, data);
            UI.alert("Data Anggota berhasil diperbarui!", "green");
            state.editingAnggotaId = null;
        } else {

            UI.alert("Anggota berhasil ditambahkan!", "green");

        document.getElementById('modal-anggota-form').classList.add('hidden');
        viewAdminAnggota();

    async function initScanner() {
        const scannerConfig = { fps: 10, qrbox: { width: 250, height: 250 }, aspectRatio: 1.0 };
        state.qrScanner = new Html5Qrcode("reader");
        let isProcessing = false;
        
        document.getElementById('startScanBtn').onclick = () => {
            const idJadwal = document.getElementById('scanJadwalId').value;
            const jenisScan = document.getElementById('scanJenis').value;
            if(!idJadwal) return UI.alert("Pilih jadwal terlebih dahulu!", "red");
            
            document.getElementById('scanner-ui').classList.remove('hidden');
            if (state.isScanning) return;
            
            state.qrScanner.start({ facingMode: "environment" }, scannerConfig, async (decodedText) => {
                if(isProcessing) return;
                isProcessing = true;
                
                const anggotaList = await DB.get('anggota');
                const anggota = anggotaList.find(a => a.username === decodedText);
                
                if(anggota) {
                    UI.alert(`Sukses Scan: ${anggota.namaLengkap} (${jenisScan})`, "green");
                    const jamS = new Date().toLocaleTimeString('id-ID', {hour: '2-digit', minute:'2-digit'});
                    let dataPresensi = { idJadwal: idJadwal, idAnggota: anggota.id, namaLengkap: anggota.namaLengkap };
                    if(jenisScan === 'Masuk') { 
                        dataPresensi.waktuMasuk = jamS; 
                        dataPresensi.status = "Hadir"; 
                    } else { 
                        dataPresensi.waktuPulang = jamS; 
                    }
                    await DB.add('presensi', dataPresensi);
                    
                    // Mainkan bunyi bell singkat sebagai tanda presensi berhasil disimpan
                    playBellSound();
                    
                    if(anggota.emailOrangTua) sendEmailJS(anggota.emailOrangTua, anggota.namaLengkap, `Scan ${jenisScan} Latihan`, jamS);
                } else {
                    UI.alert("QR Code tidak valid/Anggota tidak ditemukan!", "red");
                    speakVoice("Maaf, barcode tidak terdaftar");
                }
                setTimeout(() => { isProcessing = false; }, 2500);
            }).then(() => { state.isScanning = true; }).catch(e => { 
                UI.alert("Kamera tidak dapat diakses", "red"); 
                document.getElementById('scanner-ui').classList.add('hidden');
            });
        };
        
        document.getElementById('stopScanBtn').onclick = () => {
            if(state.qrScanner && state.isScanning) {
                state.qrScanner.stop().then(() => {
                    state.isScanning = false;
                    document.getElementById('scanner-ui').classList.add('hidden');
                }).catch(err => console.log(err));
            } else { document.getElementById('scanner-ui').classList.add('hidden'); }
        };
    }

    async function viewUserKehadiran() {
        UI.showLoading();
        const myId = state.currentUser.data.id;
        const presensiList = await DB.getUserPresensi(myId);
        const jadwal = await DB.get('jadwal');

        // Gabungkan seluruh record presensi milik anggota berdasarkan idJadwal, sehingga
        // satu jadwal latihan = satu baris (Masuk & Pulang digabung dalam baris yang sama).
        // Jika anggota sempat scan lebih dari satu kali pada jadwal yang sama, hanya jam
        // TERBARU (paling akhir) yang disimpan sebagai catatan kehadiran.
        const rekapPerJadwal = {};
        presensiList.forEach(p => {
            if (!rekapPerJadwal[p.idJadwal]) {
                rekapPerJadwal[p.idJadwal] = { idJadwal: p.idJadwal, waktuMasuk: null, waktuPulang: null };
            }
            const rec = rekapPerJadwal[p.idJadwal];
            if (p.waktuMasuk && (!rec.waktuMasuk || p.waktuMasuk > rec.waktuMasuk)) rec.waktuMasuk = p.waktuMasuk;
            if (p.waktuPulang && (!rec.waktuPulang || p.waktuPulang > rec.waktuPulang)) rec.waktuPulang = p.waktuPulang;
        });

        // Lengkapi info jadwal & urutkan dari tanggal latihan paling baru
        let rekapList = Object.values(rekapPerJadwal).map(r => {
            const j = jadwal.find(x => x.id === r.idJadwal) || { agenda: 'Jadwal Dihapus', tanggal: '' };
            return { ...r, agenda: j.agenda, tanggal: j.tanggal };
        }).sort((a, b) => new Date(b.tanggal) - new Date(a.tanggal));

        let html = `
            <h2 class="text-2xl font-bold text-gray-800 mb-6">Riwayat Kehadiran</h2>
            <div class="space-y-4">
                ${rekapList.length === 0 ? '<p class="text-gray-500 text-center mt-10">Belum ada data kehadiran terekam.</p>' : rekapList.map(r => `

                        <div class="flex gap-4">
                            <div class="text-center bg-green-50 p-2 rounded-lg min-w-[80px]"><p class="text-xs text-green-600 font-bold mb-1">MASUK</p><p class="text-sm font-semibold text-gray-800">${r.waktuMasuk || '--:--'}</p></div>
                            <div class="text-center bg-gray-50 p-2 rounded-lg min-w-[80px]"><p class="text-xs text-gray-500 font-bold mb-1">PULANG</p><p class="text-sm font-semibold text-gray-800">${r.waktuPulang || '--:--'}</p></div>
                        </div>
                    </div>
                `).join('')}
            </div>
        `;
        UI.render(renderLayout('user', html));
    }

                    <h1 class="text-2xl font-bold text-gray-800 mb-2">${appSettings.appName}</h1>
                    <p class="text-gray-500 text-sm mb-8">Pilih akses masuk Anda</p>
                    <button onclick="viewLoginAdmin()" class="w-full bg-purple-600 text-white font-bold py-4 rounded-xl mb-4 hover:bg-purple-700 transition shadow-lg"><i class="fas fa-user-shield mr-2"></i> Masuk sebagai Pelatih</button>
                    <button onclick="viewLoginUser()" class="w-full bg-white text-purple-600 border-2 border-purple-100 font-bold py-4 rounded-xl hover:bg-purple-50 transition shadow-sm"><i class="fas fa-users mr-2"></i> Masuk sebagai Anggota</button>
                </div>
            </div>
        `);
    };

    window.viewLoginAdmin = () => {
        UI.render(`
            <div class="flex items-center justify-center h-full bg-gradient-to-br from-purple-500 to-pink-700 p-4">
                <div class="glass-panel max-w-sm w-full p-8 rounded-3xl fade-in relative">
                    <button onclick="viewLoginSelector()" class="absolute top-4 left-4 text-gray-400 hover:text-gray-700"><i class="fas fa-arrow-left"></i> Kembali</button>
                    <div class="text-center mt-6 mb-8">
                        <img src="${appSettings.appIcon}" onerror="this.onerror=null; this.src='https://cdn-icons-png.flaticon.com/512/3387/3387063.png';" class="w-16 h-16 object-cover rounded-full mx-auto shadow-md border-2 border-white mb-2">
                        <h2 class="text-xl font-bold text-gray-800">Login Pelatih</h2>
                    </div>
                    <form onsubmit="handleLoginAdmin(event)" class="space-y-4">
                        <div><input required type="email" id="admEmail" placeholder="Email Firebase Auth" class="w-full p-4 bg-gray-50 border border-gray-200 rounded-xl outline-none focus:ring-2 focus:ring-purple-500"></div>
                        <div><input required type="password" id="admPass" placeholder="Password" class="w-full p-4 bg-gray-50 border border-gray-200 rounded-xl outline-none focus:ring-2 focus:ring-purple-500"></div>
                        ${IS_PREVIEW ? '<p class="text-xs text-red-500 text-center font-bold">*Mode Preview: Ketik sembarang untuk masuk</p>' : ''}
                        <button type="submit" class="w-full bg-purple-600 text-white font-bold py-4 rounded-xl hover:bg-purple-700 transition shadow-lg mt-2">Masuk Panel Admin</button>
                    </form>
                </div>
            </div>
        `);
    };

    window.viewLoginUser = () => {
        UI.render(`
            <div class="flex items-center justify-center h-full bg-gradient-to-br from-purple-500 to-pink-700 p-4">
                <div class="glass-panel max-w-sm w-full p-8 rounded-3xl fade-in relative">
                    <button onclick="viewLoginSelector()" class="absolute top-4 left-4 text-gray-400 hover:text-gray-700"><i class="fas fa-arrow-left"></i> Kembali</button>
                    <div class="text-center mt-6 mb-8">
                        <img src="${appSettings.appIcon}" onerror="this.onerror=null; this.src='https://cdn-icons-png.flaticon.com/512/3387/3387063.png';" class="w-16 h-16 object-cover rounded-full mx-auto shadow-md border-2 border-white mb-2">
                        <h2 class="text-xl font-bold text-gray-800">Login Anggota</h2>
                    </div>
                    <form onsubmit="handleLoginUser(event)" class="space-y-4">
                        <div><input required type="text" id="usrName" placeholder="Username (contoh: user1)" class="w-full p-4 bg-gray-50 border border-gray-200 rounded-xl outline-none focus:ring-2 focus:ring-purple-500"></div>
                        <div><input required type="password" id="usrPass" placeholder="Password (contoh: 123)" class="w-full p-4 bg-gray-50 border border-gray-200 rounded-xl outline-none focus:ring-2 focus:ring-purple-500"></div>
                        <button type="submit" class="w-full bg-purple-600 text-white font-bold py-4 rounded-xl hover:bg-purple-700 transition shadow-lg mt-2">Masuk Panel Anggota</button>
                    </form>
                </div>
            </div>
        `);
    };

    window.handleLoginAdmin = async (e) => {
        e.preventDefault();
        const em = document.getElementById('admEmail').value; const ps = document.getElementById('admPass').value;
        UI.showLoading();
        try {
            if(!IS_PREVIEW) { await signInWithEmailAndPassword(auth, em, ps); await autoSetupDatabase(); }
            state.currentUser = { role: 'admin' }; localStorage.setItem('marching_session', JSON.stringify({role: 'admin'}));
            await loadSettings();
            navigate('admin-dashboard');
        } catch(err) { UI.alert("Login gagal! Cek kredensial Anda.", "red"); window.viewLoginAdmin(); }
    };

    window.handleLoginUser = async (e) => {
        e.preventDefault();
        const un = document.getElementById('usrName').value; const ps = document.getElementById('usrPass').value;
        UI.showLoading();
        try {
            let userDoc = null;
            if(IS_PREVIEW) { userDoc = mockDB.anggota.find(x => x.username === un && x.password === ps); } 
            else {
                const q = query(collection(db, "anggota"), where("username", "==", un), where("password", "==", ps));
                const snap = await getDocs(q);
                if(!snap.empty) userDoc = { id: snap.docs[0].id, ...snap.docs[0].data() };
            }
            if(userDoc) {
                state.currentUser = { role: 'user', data: userDoc }; localStorage.setItem('marching_session', JSON.stringify(state.currentUser));
                await loadSettings();
                navigate('user-dashboard');
            } else { UI.alert("Username atau Password salah!", "red"); window.viewLoginUser(); }
        } catch(err) { UI.alert("Terjadi kesalahan jaringan", "red"); window.viewLoginUser(); }
    };

    // Binding fungsi ke lingkup global agar dapat dipanggil oleh elemen HTML onclick
    window.printSatuKartu = printSatuKartu;
    window.printSemuaKartu = printSemuaKartu;
    window.bukaModalTambahAnggota = bukaModalTambahAnggota;
    window.tutupModalAnggota = tutupModalAnggota;
    window.cariAnggota = cariAnggota;

    window.onload = async () => {
        await loadSettings();
        const session = localStorage.getItem('marching_session');
        if(session) {
            state.currentUser = JSON.stringify(session) !== 'undefined' ? JSON.parse(session) : null;
            if(state.currentUser && state.currentUser.role === 'admin') navigate('admin-dashboard');
            else if(state.currentUser && state.currentUser.role === 'user') navigate('user-dashboard');
            else window.viewLoginSelector();
        } else { window.viewLoginSelector(); }
    };
</script>

</body>
</html>
